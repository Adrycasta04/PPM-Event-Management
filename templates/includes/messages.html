{% if messages %}
    <div class="message-stack" aria-live="polite" aria-atomic="true">
        {% for message in messages %}
            <div
                class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show shadow-sm"
                role="alert"
            >
                <div class="fw-medium">{{ message }}</div>
                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="alert"
                    aria-label="Chiudi messaggio"
                ></button>
            </div>
        {% endfor %}
    </div>
{% endif %}
