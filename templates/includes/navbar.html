<nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'events:home' %}">PPM Events</a>
        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNavigation"
            aria-controls="mainNavigation"
            aria-expanded="false"
            aria-label="Apri navigazione"
        >
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavigation">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'events:home' %}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'events:list' %}">
                        Events
                    </a>
                </li>
                {% if user_is_organizer %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'events:my_events' %}">
                            My events
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'events:create' %}">
                            Create event
                        </a>
                    </li>
                {% endif %}

                    <li class="nav-item">
                        <span class="navbar-text me-lg-3">
                            {{ user.get_username }}
                        </span>
                    </li>
                    <li class="nav-item">
                        <form method="post" action="{% url 'accounts:logout' %}">
                            {% csrf_token %}
                            <button class="btn btn-link nav-link" type="submit">

                            </button>

                    <li class="nav-item">
